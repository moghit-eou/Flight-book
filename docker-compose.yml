services:
  backend:
    build:
      context: ./backend
    container_name: flight-backend
    ports:
      - "8080:8080"
    environment:
      FLIGHT_API_KEY: ${FLIGHT_API_KEY}

  frontend:
    build:
      context: ./frontend
    container_name: flight-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend