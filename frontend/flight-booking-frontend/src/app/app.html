<div class="navbar-container">
  <nav class="navbar">
    <div class="nav-logo" routerLink="/flights" style="cursor: pointer;">
      <div class="logo-icon-badge">
        <i class="ti ti-plane-departure"></i>
      </div>
      <span class="logo-text">SkyBook</span>
    </div>
    
    <div class="nav-menu">
      <a routerLink="/flights" routerLinkActive="active">
        <i class="ti ti-plane"></i> <span>Vols</span>
      </a>
      
      @if (isLoggedIn) {
        @if (isAdmin) {
          <a routerLink="/admin/dashboard" routerLinkActive="active">
            <i class="ti ti-settings"></i> <span>Administration</span>
          </a>
        } @else {
          <a routerLink="/my-bookings" routerLinkActive="active">
            <i class="ti ti-calendar-check"></i> <span>Mes Réservations</span>
          </a>
        }
      }
    </div>

    <div class="nav-actions">
      @if (isLoggedIn) {
        <div class="nav-profile" (click)="toggleDropdown()" style="position: relative; cursor: pointer;">
          <span class="nav-username">
            <i class="ti ti-user-circle"></i> 
            <span class="username-text">{{ firstName }}</span> 
            <i class="ti ti-chevron-down nav-chevron"></i>
          </span>
          @if (dropdownOpen) {
            <div class="nav-dropdown">
              <div class="dropdown-user-info">
                <i class="ti ti-user"></i>
                <span class="dropdown-name">{{ firstName }}</span>
              </div>
              <hr>
              <a (click)="logout()"><i class="ti ti-logout"></i> Déconnexion</a>
            </div>
          }
        </div>
      } @else {
        <a routerLink="/login" class="nav-login-link" routerLinkActive="active">
          <i class="ti ti-login"></i> <span>Connexion</span>
        </a>
        <a routerLink="/register" class="nav-cta">
          Rejoins-nous
        </a>
      }
    </div>
  </nav>
</div>

<router-outlet></router-outlet>

<!-- Toast Notifications -->
<div *ngIf="toast" class="toast-popup" [ngClass]="toast.type">
  <span class="toast-icon">
    <ng-container [ngSwitch]="toast.type">
      <svg *ngSwitchCase="'error'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <svg *ngSwitchCase="'success'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      <svg *ngSwitchCase="'info'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
    </ng-container>
  </span>
  <span class="toast-message">{{ toast.text }}</span>
</div>

<!-- Custom Premium Confirmation Dialog -->
<div *ngIf="showConfirmModal" class="confirm-overlay" (click)="handleConfirmResponse(false)">
  <div class="confirm-card" (click)="$event.stopPropagation()">
    <div class="confirm-body">
      <div class="confirm-icon">
        <i class="ti ti-alert-circle"></i>
      </div>
      <div class="confirm-content">
        <h3>Confirmation</h3>
        <p>{{ confirmMessage }}</p>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn-confirm-cancel" (click)="handleConfirmResponse(false)">Annuler</button>
      <button class="btn-confirm-ok" (click)="handleConfirmResponse(true)">Confirmer</button>
    </div>
  </div>
</div>
