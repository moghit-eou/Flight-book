<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon blue">
        <i class="ti ti-lock"></i>
      </div>
      <div>
        <h2>Connexion</h2>
        <p class="auth-sub">Content de vous revoir !</p>
      </div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="ti ti-mail input-icon"></i>
          <input formControlName="email" type="email" placeholder="vous@exemple.com"
            [class.input-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        </div>
        <div class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          <i class="ti ti-alert-circle"></i> Adresse email invalide
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <i class="ti ti-lock input-icon"></i>
          <input formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [class.input-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          <button type="button" class="toggle-eye" (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Cacher' : 'Voir'">
            <i class="ti" [class.ti-eye]="!showPassword" [class.ti-eye-off]="showPassword"></i>
          </button>
        </div>
        <div class="field-error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          <i class="ti ti-alert-circle"></i> Mot de passe requis
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading"><i class="ti ti-login"></i> Se connecter</span>
        <span *ngIf="loading"><i class="ti ti-loader"></i> Connexion...</span>
      </button>
    </form>

    <p class="auth-footer">Pas de compte ? <a routerLink="/register">Créer un compte</a></p>
  </div>
</div>
