<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon green">
        <i class="ti ti-user-plus"></i>
      </div>
      <div>
        <h2>Créer un compte</h2>
        <p class="auth-sub">Rejoignez SkyBook dès maintenant</p>
      </div>
    </div>

    <div class="form-group">
      <label>Prénom</label>
      <div class="input-wrap">
        <i class="ti ti-user input-icon"></i>
        <input formControlName="firstName" type="text" placeholder="Votre prénom">
      </div>
    </div>

    <div class="form-group">
      <label>Nom</label>
      <div class="input-wrap">
        <i class="ti ti-user input-icon"></i>
        <input formControlName="lastName" type="text" placeholder="Votre nom">
      </div>
    </div>

    <div class="form-group">
      <label>Ville</label>
      <div class="input-wrap">
        <i class="ti ti-building input-icon"></i>
        <input formControlName="city" type="text" placeholder="Votre ville">
      </div>
    </div>

    <div class="form-group">
      <label>Pays</label>
      <div class="input-wrap">
        <i class="ti ti-world input-icon"></i>
        <input formControlName="country" type="text" placeholder="Votre pays">
      </div>
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <div class="input-wrap">
        <i class="ti ti-phone input-icon"></i>
        <input formControlName="phoneNumber" type="tel" placeholder="+212 6XX XXX XXX">
      </div>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <i class="ti ti-mail input-icon"></i>
          <input formControlName="email" type="email" placeholder="vous@exemple.com"
            [class.input-error]="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
        </div>
        <div class="field-error" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
          <i class="ti ti-alert-circle"></i> Adresse email invalide
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <i class="ti ti-lock input-icon"></i>
          <input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="Min. 6 caractères"
            [class.input-error]="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
          <button type="button" class="toggle-eye" (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Cacher' : 'Voir'">
            <i class="ti" [class.ti-eye]="!showPassword" [class.ti-eye-off]="showPassword"></i>
          </button>
        </div>
        <div class="field-error" *ngIf="registerForm.get('password')?.hasError('minlength')">
          <i class="ti ti-alert-circle"></i> Le mot de passe doit contenir au moins 6 caractères
        </div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="input-wrap">
          <i class="ti ti-lock input-icon"></i>
          <input formControlName="confirmPassword" type="password" placeholder="Répétez le mot de passe">
        </div>
      </div>
      <div class="password-strength" *ngIf="registerForm.get('password')?.value">
        <div class="strength-bar">
          <div class="strength-fill" [class]="'strength-' + strengthLabel" [style.width]="passwordStrength + '%'">
          </div>
        </div>
        <span class="strength-text" [class]="'strength-' + strengthLabel">
          Force : {{ strengthLabel }}
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || loading">
        <span *ngIf="!loading"><i class="ti ti-user-check"></i> S'inscrire</span>
        <span *ngIf="loading"><i class="ti ti-loader"></i> Création...</span>
      </button>
    </form>

    <p class="auth-footer">Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>
